<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electraze 2k25</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<style>
body{
    min-height:100vh;
    max-height: fit-content;
    background:linear-gradient(135deg,#0b132b,#1c2541,#3a506b);
    /* display:flex; */
    justify-content:center;
    align-items:center;
    color:#fff;
    overflow:scroll;
}
nav{
    margin-top: 20px;
    /* display: flex; */
    /* justify-content: end; */
}
.container1{
    content: normal;
    margin-top:10vh;
    margin-left: 27vw;
    background-color: cornflowerblue;
    border-radius: 5%;
    width:100%;
    max-width:fit-content;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    min-height:fit-content;
    padding:10px 20px;
    text-align:left;
}
.container1 h2{
    position: relative;
    color:#1c2541;
}
.forms{
    margin-top: 20px;
}


    </style>
    
<body>
    <!-- navigation bar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-xl"> 
            <!-- icon & name -->
            <a class="navbar-brand" href="#" style="color: whitesmoke; font-size:30px;">
                <img src="Image/Electraze-icon.png" alt="logo" width="60px" height="60px">
                ELECTRAZE 2K25
            </a>
            <!-- Taggle icon -->
            <button class="navbar-taggler" data-bs-target="#links" data-bs-toggle="collapse" >
                <div class="navbar-toggler-icon"></div>
            </button>
            <!-- navigation elements -->
            <div id="links" class="collapse navbar-collapse justify-content-end">
                <div class="navbar-nav">
                <a class="btn btn-outline-info m-1" href="#" class="nav-link">Home</a>
                <a class="btn btn-outline-info m-1" href="#" class="nav-link">Events</a>
                <a class="btn btn-outline-info m-1" href="#" class="nav-link">Contact</a>
                </div>
            </div>
        </div>
    </nav>
    <h1 class="bg-cornflowerblue p-1 m-5 border border-info bor rounded-pill shadow text-center" style="font-family: Cambria, Cochi; font-size: 50px; color:cornflowerblue ;">ELECTRAZE 2K25</h1>
    <!--Registration form -->
    <div class="bottom">
        <div class="container1">
            <h2 class="bg-cornflowerblue p-3 border border-info rounded-pill shadow text-center">REGISTRATION FORM</h2>
            <form id="registrationForm">
                <div class="container-lg">
                <label class="forms">FIRST NAME:</label> 
                <input id="firstName" class="forms" type="text" name="name" placeholder="Name" required>
                <label class="forms">LAST NAME:</label> 
                <input id="lastName" class="forms" type="text" name="name" placeholder="Name" required><br>
                <label class="forms">COLLEGE NAME:</label>
                <input id="college" class="forms" type="text" name="college" placeholder="College" required><br>
                <label class="forms">E-MAIL:</label>
                <input id="email" class="forms" type="email" name="email" placeholder="Email" required>
                <label class="forms">PHONE:</label>
                <input id="phone" class="forms" type="text" name="phone" placeholder="Phone" required><br><br>
                </div>
                <h2 class="bg-cornflowerblue p-3 border border-info rounded-pill shadow text-center">TECHNICAL EVENTS</h2>
                <div class="container my-4">
                    <div class="row">
                        <span class="col m-1 ">
                            <img src="Image/Paper_Presentation.png" alt=" Paper presentation" width="200px" height="100px"><br>
                            <input id="paper" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Paper Presentation">
                            <label style="font-size: 20px;" for="T1">Paper Presentation</label>
                        </span>
                        <span class="col m-1 ">
                            <img src="Image/Project_Expo.png" alt="Project_Expo" width="200px" height="100px"><br>
                            <input id="project" class="form-check-input" style="font-size: 20px;" type="checkbox" value="project Expo">
                            <label style="font-size: 20px;" for="T2">Project Expo</label><br>
                        </span>
                        </div>
                        <div class="row">
                        <span class="col m-1 ">
                            <img src="Image/Signal_Identification.png" alt="Signal_Identification" width="200px" height="100px"><br>
                            <input id="signal" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Signal Identification">
                            <label style="font-size: 20px;" for="T1">Signal Identification</label>
                        </span>
                        <span class="col m-1 ">
                            <img src="Image/Technical_Quiz.png" alt="Technical_Quiz" width="200px" height="100px"><br>
                            <input id="quiz" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Technical Quiz">
                            <label style="font-size: 20px;" for="T1">Technical Quiz</label>
                        </span>
                    </div>
                </div>
                 <h2 class="bg-cornflowerblue p-3 border border-info rounded-pill shadow text-center">NON-TECHNICAL EVENTS</h2>
                <div class="container my-4">
                    <div class="row">
                        <span class="col m-1 ">
                            <img src="Image/Photograph.png" alt="Photography" width="200px" height="100px"><br>
                            <input id="photo" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Photography">
                            <label style="font-size: 20px;" for="T1">Photograph</label>
                        </span>
                        <span class="col m-1 ">
                            <img src="Image/Treasure_hunt.png" alt="Treasure_Hunt" width="200px" height="100px"><br>
                            <input id="treasure" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Treasure Hunt">
                            <label style="font-size: 20px;" for="T2">Treasure Hunt</label><br>
                        </span>
                        </div>
                        <div class="row">
                        <span class="col m-1 ">
                            <img src="Image/Talent_Hunt.png" alt="Talent_Hunt" width="200px" height="100px"><br>
                            <input id="talent" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Talent Hunt">
                            <label style="font-size: 20px;" for="T1">Talent Hunt</label>
                        </span>
                        <span class="col m-1 ">
                            <img src="Image/Connect.png" alt="Connection" width="200px" height="100px"><br>
                            <input id="connection" class="form-check-input" style="font-size: 20px;" type="checkbox" value="Connection">
                            <label style="font-size: 20px;" for="T1">Connection</label>
                        </span>
                    </div>
                    </div>
                    <button type="submit"  class="btn btn-info rounded p-2" style="margin-left:40%;"> SUBMIT
                    </button>
            </form>
        </div>
    </div>
